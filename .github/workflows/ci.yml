name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go mod verify
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go mod verify
      - run: go test -race -shuffle=on -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      # Upload coverage artifact — ready for Codecov integration (e.g. codecov/codecov-action@v5)
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - run: go mod verify
      - run: go build ./...
      - run: go build ./examples/...
